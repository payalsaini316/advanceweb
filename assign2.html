<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Async Weather Tracker</h1>
    <div id="search-main-container">
        <div id="" first-search-container>
            <h3>Search City</h3>
            <form action="">
                <input type="text" name="" id="search-city">
                <button type="submit">Search</button>
            </form>
        </div>
        <div id="second-search-container">
            <h3>Search History</h3>
            <div id="search-history">

            </div>
        </div>
    </div>
    <div id="weather-info-main">
        <h3>Weather Info</h3>
        <div id="fetched-data-container"></div>

    </div>
    <script>
        const API_KEY = "7a9b350d9612d49ccd354998ccdd1de6"
        let form = document.querySelector("form")
        let city = document.querySelector("#search-city")
        let weather = document.querySelector("#fetched-data-container")
        let searchedCity = document.querySelector("#search-city")

        async function getWeatherInfo(city) {
            let response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`)
            let data = await response.json()
            console.log(data)
            let card = document.createElement('div')
            card.innerHTML = `<div>City : ${data.name},${data.sys.country}</div>
                        <div>Temp:${data.main.temp}</div>
                        <div>Weather:${data.weather[0].main}</div>
                        <div>Humidity:${data.main.humidity}</div>
                        <div>Wind:${data.wind.speed}</div>`

            weather.innerHTML = ""
            weather.append(card)
            localStorage.setItem("cities", city.value)
        }
        let searched = localStorage.getItem("cities")
        searchedCity.innerHTML = `<button>${searched}</button>`

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            getWeatherInfo(city.value)
        })
    </script>
</body>

</html>
